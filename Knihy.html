@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap');

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  color: #e8e3d6;

  background:
    linear-gradient(rgba(10,12,18,0.85), rgba(10,12,18,0.9)),
    url("https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=1920&q=80");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

/* texture overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 3px 3px;
  opacity: 0.4;
  pointer-events: none;
}

/* HEADER */
h1 {
  font-family: "Cinzel", serif;
  text-align: center;
  font-size: 42px;
  margin: 25px 0;
}

/* LAYOUT */
.container {
  max-width: 820px;
  margin: auto;
  padding: 20px;
}

.panel {
  background: rgba(20, 24, 35, 0.6);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 15px;
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* FILTER BAR */
.filter-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}

.counter {
  margin-left: auto;
  font-family: "Cinzel", serif;
  opacity: 0.9;
  white-space: nowrap;
}

/* FORM ELEMENTS */
select {
  background: #121622;
  color: #e8e3d6;
  border: 1px solid #2b3247;
  padding: 10px 12px;
  border-radius: 10px;
}

button {
  background: linear-gradient(135deg, #3b3f99, #6b4cff);
  color: white;
  border: none;
  padding: 11px 16px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(107, 76, 255, 0.4);
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 22px rgba(107, 76, 255, 0.6);
}

/* RESULT BOX */
.result {
  font-size: 22px;
  text-align: center;
  padding: 15px;
  font-family: "Cinzel", serif;
  min-height: 60px;
  transition: transform 0.2s;
}

/* BOOK LIST */
.book {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;

  padding: 14px;
  margin: 8px 0;

  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;

  transition: 0.2s;
}

.book:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.06);
}

/* LEFT SIDE */
.book-left {
  display: flex;
  gap: 12px;
  align-items: center;
  min-width: 0;
}

/* TITLE + META */
.title-block {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}

.title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.title-row strong {
  font-size: 18px;
  margin: 0;
}

/* META INFO */
.meta {
  opacity: 0.7;
  font-size: 13px;
}

.author {
  font-weight: 600;
  color: #f0e6d2;
}

.genres {
  opacity: 0.6;
}

.dot {
  margin: 0 6px;
  opacity: 0.4;
}

/* BADGE (series) */
.badge {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  white-space: nowrap;
}

/* HEARTBEAT ANIMATION */
.heartbeat {
  animation: beat 0.6s infinite alternate;
}

@keyframes beat {
  from { transform: scale(1); }
  to { transform: scale(1.02); }
}

/* RESULT POP */
.pop {
  transform: scale(1.08);
}

</style>
</head>

let authorFilter = "all";
let genreFilter = "all";
let readFilter = "all";

function unique(arr, key) {
  return [...new Set(arr.flatMap(b => b[key]))];
}

function formatAuthor(name) {
  const parts = name.trim().split(" ");
  if (parts.length === 1) return name;
  const last = parts[parts.length - 1];
  const first = parts.slice(0, -1).join(" ");
  return `${last}, ${first}`;
}

function initFilters() {
  const a = document.getElementById("authorFilter");
  const g = document.getElementById("genreFilter");

  const authors = [...new Set(books.flatMap(b => b.author))];

  const formattedAuthors = authors
    .map(raw => ({
      raw,
      display: formatAuthor(raw)
    }))
    .sort((x, y) => x.display.localeCompare(y.display, "cs"));

  a.innerHTML =
    `<option value="all">Všichni autoři</option>` +
    formattedAuthors
      .map(x => `<option value="${x.raw}">${x.display}</option>`)
      .join("");

  const genres = unique(books, "genre")
  .sort((a, b) => a.localeCompare(b, "cs"));

  g.innerHTML =
    `<option value="all">Všechny žánry</option>` +
    genres.map(x => `<option value="${x}">${x}</option>`).join("");
}

function getFiltered() {
  return books.filter(b =>
    (authorFilter === "all" || b.author.includes(authorFilter)) &&
    (genreFilter === "all" || b.genre.includes(genreFilter)) &&
    (readFilter === "all" ||
      (readFilter === "read" && b.read) ||
      (readFilter === "unread" && !b.read)
    )
  );
}

function renderCounter(shown) {
  document.getElementById("counter").innerHTML =
    `📚 ${shown} / ${books.length}`;
}

function render() {
  authorFilter = document.getElementById("authorFilter").value;
  genreFilter = document.getElementById("genreFilter").value;
  readFilter = document.getElementById("readFilter").value;

  const list = document.getElementById("list");
  list.innerHTML = "";

  const filtered = getFiltered();

  filtered.forEach(b => {

  const genresSorted = b.genre
    .slice()
    .sort((a, b) => a.localeCompare(b, "cs"))
    .join(", ");

  const authorsSorted = b.author
    .slice()
    .sort((a, b) => a.localeCompare(b, "cs"))
    .join(", ");

  list.innerHTML += `
    <div class="book">

      <div style="display:flex; gap:12px; align-items:center;">

        ${b.isbn ? `
          <img
            src="https://covers.openlibrary.org/b/isbn/${b.isbn.replace(/-/g, '')}-M.jpg"
            style="width:40px;height:60px;object-fit:cover;border-radius:4px;"
            onerror="this.style.display='none'"
          />
        ` : ""}

        <div>
        <div class="title-row">
  <strong>${b.title}</strong>

  ${b.series ? `
    <span class="badge">${b.series} • ${b.seriesOrder}</span>
  ` : ""}
</div>

<div class="meta">
            <span class="author">${authorsSorted}</span>
            <span class="dot">•</span>
            <span class="genres">${genresSorted}</span>
          </div>
        </div>

      </div>

      <div>${b.read ? "📖" : "📕"}</div>

    </div>
  `;
});

  renderCounter(filtered.length);
}

function pickBook() {
  const result = document.getElementById("result");

  const filtered = getFiltered();

  const valid = filtered.filter(b => {
    if (b.read) return false;

    if (!b.series) return true;

    if (b.seriesOrder === 1) return true;

    for (let i = 1; i < b.seriesOrder; i++) {
      const prev = books.find(x =>
        x.series === b.series &&
        x.seriesOrder === i
      );

      if (!prev || !prev.read) return false;
    }

    return true;
  });

  if (valid.length === 0) {
    result.innerText = "Nic už nezbývá…";
    return;
  }

  result.style.filter = "blur(6px)";
  result.classList.add("heartbeat");

  let i = 0;
  let delay = 50;

  function spin() {

    const pool = i < 22 ? filtered : valid;
    const fake = pool[Math.floor(Math.random() * pool.length)];

    result.innerHTML = `
      📖 ${fake.title}<br>
      <span style="opacity:.5">${fake.author}</span>
    `;

    i++;
    delay += 12;

    if (i < 30) {
      setTimeout(spin, delay);
    } else {
      const final = valid[Math.floor(Math.random() * valid.length)];

      setTimeout(() => {

        result.classList.remove("heartbeat");
        result.style.filter = "blur(0px)";
        result.classList.add("pop");

        result.innerHTML = `
          📖 <strong>${final.title}</strong><br>
          <span style="opacity:.7">${final.author}</span>
        `;

        setTimeout(() => {
          result.classList.remove("pop");
        }, 200);

      }, 400);
    }
  }

  spin();
}

initFilters();
render();
